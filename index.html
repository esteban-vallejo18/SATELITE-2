<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Simposio Linfoma | Al Pharma</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #eef2f8;
      font-family: 'Inter', system-ui, sans-serif;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .form-wrapper { max-width: 1000px; width: 100%; margin: 0 auto; }

    /* Tarjeta con borde más marcado y sombra interior */
    .form-card {
      background: #ffffff;
      border-radius: 28px;
      box-shadow: 0 20px 40px -12px rgba(0,0,0,0.15), inset 0 0 0 1px rgba(243,33,139,0.08);
      overflow: hidden;
      border-left: 6px solid #f3218b;
    }

    /* Cabecera con patrón de ondas (usamos un pseudo-elemento) */
    .header-satelite {
      background: linear-gradient(145deg, #081135 0%, #1f3a7a 100%);
      padding: 40px 28px 36px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .header-satelite::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -20%;
      width: 140%;
      height: 200%;
      background: repeating-linear-gradient(45deg, transparent, transparent 20px, rgba(243,33,139,0.05) 20px, rgba(243,33,139,0.05) 40px);
      pointer-events: none;
    }
    .header-satelite .badge-satelite {
      background: #f3218b;
      display: inline-block;
      padding: 4px 18px;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      color: white;
      text-transform: uppercase;
      margin-bottom: 16px;
      box-shadow: 0 4px 12px rgba(243,33,139,0.3);
      position: relative;
    }
    .header-satelite h1 {
      font-size: 2.2rem;
      font-weight: 700;
      color: white;
      margin-bottom: 6px;
      line-height: 1.2;
      position: relative;
    }
    .header-satelite h1 span { color: #f3218b; }
    .header-satelite .subtitulo {
      font-size: 1rem;
      color: #b8cbf0;
      font-weight: 400;
      position: relative;
    }
    .header-satelite .ponente {
      font-size: 0.9rem;
      color: #a8bce6;
      margin-top: 12px;
      font-weight: 300;
      position: relative;
      padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,0.1);
      display: inline-block;
    }
    .header-satelite .ponente strong { color: #ffffff; }

    /* Cuerpo del formulario */
    .card-body { padding: 32px 28px; background: white; }

    /* Grid con margen inferior más amplio */
    .form-grid { display: flex; flex-wrap: wrap; gap: 24px 20px; }
    .field { flex: 1 1 calc(50% - 20px); min-width: 200px; }

    /* Etiquetas con un toque diferente */
    label {
      display: block;
      font-size: 0.7rem;
      font-weight: 600;
      color: #1e293b;
      margin-bottom: 6px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      padding-left: 2px;
    }
    .required { color: #f3218b; margin-left: 4px; }

    /* Campos con borde inferior más marcado (estilo moderno) */
    input, select {
      width: 100%;
      padding: 14px 16px;
      background: #f8fafc;
      border: none;
      border-bottom: 2px solid #dce2ec;
      border-radius: 0;
      font-size: 0.9rem;
      font-family: 'Inter', sans-serif;
      transition: all 0.25s ease;
      color: #0f172a;
    }
    input:focus, select:focus {
      outline: none;
      border-bottom-color: #f3218b;
      background: #ffffff;
      box-shadow: 0 4px 8px -4px rgba(243,33,139,0.15);
    }

    /* Checkbox con estilo de tarjeta */
    .checkbox-field {
      background: #f8fafc;
      border-radius: 20px;
      padding: 16px 20px;
      margin: 20px 0 24px;
      border: 1px solid #e2e8f0;
      transition: all 0.2s;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
    }
    .checkbox-field:hover { border-color: #f3218b; }
    .checkbox-label {
      display: flex; align-items: flex-start; gap: 14px;
      cursor: pointer; font-size: 0.85rem; color: #1e293b; line-height: 1.4;
    }
    .checkbox-label input { width: 20px; height: 20px; margin-top: 2px; flex-shrink: 0; accent-color: #f3218b; }
    .checkbox-label strong { color: #081135; }

    /* Botón con efecto de desplazamiento */
    .btn-submit {
      background: linear-gradient(135deg, #081135, #1f3a7a);
      border: none;
      width: 100%;
      padding: 16px;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 60px;
      color: white;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'Inter', sans-serif;
      position: relative;
      overflow: hidden;
      box-shadow: 0 6px 16px rgba(8,17,53,0.25);
    }
    .btn-submit::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(95deg, #f3218b, #d41a76);
      transition: left 0.4s ease;
      z-index: 0;
      border-radius: 60px;
    }
    .btn-submit:hover::after { left: 0; }
    .btn-submit span {
      position: relative;
      z-index: 1;
    }
    .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 10px 24px rgba(8,17,53,0.35); }

    /* Mensajes */
    .message {
      margin-top: 20px; padding: 12px 16px; border-radius: 16px;
      text-align: center; font-weight: 500; display: none; font-size: 0.85rem;
    }
    .success { background: #e6f7ec; color: #0e5e2e; border-left: 4px solid #27e083; }
    .error { background: #fff0f0; color: #c41e3a; border-left: 4px solid #f3218b; }
    .sending { background: #eef2ff; color: #1e3a5f; border-left: 4px solid #1e3a5f; }

    @media (max-width: 640px) {
      body { padding: 16px; }
      .card-body { padding: 24px 20px; }
      .field { flex: 1 1 100%; }
      .header-satelite h1 { font-size: 1.5rem; }
      .header-satelite .subtitulo { font-size: 0.9rem; }
    }
  </style>
</head>
<body>
<div class="form-wrapper">
  <div class="form-card">
    
    <!-- CABECERA CON PATRÓN -->
    <div class="header-satelite">
      <div class="badge-satelite">Simposio Satélite</div>
      <h1>Linfoma refractario o en <span>recaída</span></h1>
      <div class="subtitulo">(Al Pharma) · Actualización en manejo</div>
      <div class="ponente">Ponente: <strong>Dra. Claudia Agudelo</strong></div>
    </div>

    <!-- FORMULARIO -->
    <div class="card-body">
      <form id="registroLinfoma">
        <div class="form-grid">
          <div class="field"><label>Nombre completo <span class="required">*</span></label><input type="text" id="nombre" placeholder="Ej. Ana María López" required></div>
          <div class="field"><label>Cédula <span class="required">*</span></label><input type="text" id="cedula" placeholder="Número de identificación" required></div>
          <div class="field"><label>Profesión / Estudiante <span class="required">*</span></label><select id="profesion" required><option value="">Selecciona</option><option>Profesional</option><option>Estudiante</option><option>Otro</option></select></div>
          <div class="field"><label>Especialidad</label><input type="text" id="especialidad" placeholder="Ej: Oncología, Hematología"></div>
          <div class="field"><label>Ciudad <span class="required">*</span></label><input type="text" id="ciudad" placeholder="Ciudad" required></div>
          <div class="field"><label>Teléfono <span class="required">*</span></label><input type="tel" id="telefono" placeholder="Ej: 3001234567" required></div>
          <div class="field"><label>Correo electrónico <span class="required">*</span></label><input type="email" id="correo" placeholder="tucorreo@ejemplo.com" required></div>
          <div class="field"><label>Institución</label><input type="text" id="institucion" placeholder="Empresa / Universidad"></div>
        </div>

        <div class="checkbox-field">
          <label class="checkbox-label">
            <input type="checkbox" id="autorizacion" required>
            <span><strong>Autorizo el tratamiento de mis datos personales</strong> según la política de privacidad. <span class="required">*</span></span>
          </label>
        </div>

        <button type="submit" class="btn-submit"><span>INSCRIBIRME AHORA →</span></button>
        <div id="messageBox" class="message"></div>
      </form>
    </div>

  </div>
</div>

<script>
  // ⚠️ REEMPLAZA ESTA URL POR LA QUE OBTENGAS DE APPS SCRIPT
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbznIn_fdENtI6jCPheXREBUFjOGjfynjqe1e5ig9ImDGMzkGkb0NO6L3qbSCEHY7o0Ejw/exec';
  
  const form = document.getElementById('registroLinfoma');
  const messageBox = document.getElementById('messageBox');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    messageBox.style.display = 'none';
    messageBox.innerHTML = 'Enviando inscripción...';
    messageBox.className = 'message sending';
    messageBox.style.display = 'block';

    const datos = {
      nombre: document.getElementById('nombre').value,
      cedula: document.getElementById('cedula').value,
      profesion: document.getElementById('profesion').value,
      especialidad: document.getElementById('especialidad').value,
      ciudad: document.getElementById('ciudad').value,
      telefono: document.getElementById('telefono').value,
      correo: document.getElementById('correo').value,
      institucion: document.getElementById('institucion').value,
      autorizacion: document.getElementById('autorizacion').checked
    };

    try {
      await fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(datos)
      });
      messageBox.innerHTML = '✅ ¡Inscripción exitosa! Te esperamos en el Simposio Satélite.';
      messageBox.className = 'message success';
      form.reset();
    } catch (error) {
      messageBox.innerHTML = '❌ Error al enviar. Por favor intenta de nuevo.';
      messageBox.className = 'message error';
    }
    setTimeout(() => { messageBox.style.display = 'none'; }, 5000);
  });
</script>
</body>
</html>
